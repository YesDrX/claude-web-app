{% extends "base.html" %}
{% block title %}Login - Claude Code Web{% endblock %}
{% block content %}
<div class="flex items-center justify-center min-h-[80vh]">
    <div class="card w-full max-w-md p-8">
        <div class="text-center mb-6">
            <i class="fa-solid fa-terminal text-5xl text-blue-400 mb-3"></i>
            <h1 class="text-2xl font-bold">Claude Code Web</h1>
            <p class="text-slate-400 mt-1">Sign in to continue</p>
        </div>
        {% if error %}
        <div class="bg-red-900/50 border border-red-700 text-red-300 px-4 py-3 rounded-lg mb-4 text-sm">
            <i class="fa-solid fa-triangle-exclamation mr-2"></i> {{ error }}
        </div>
        {% endif %}
        <form method="post" action="/login">
            <div class="mb-4">
                <label class="block text-sm font-medium text-slate-300 mb-1">Username</label>
                <input type="text" name="username" required
                    class="w-full bg-slate-700 border border-slate-600 text-slate-100 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                    placeholder="Enter username" autocomplete="username">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-slate-300 mb-1">Password</label>
                <input type="password" name="password" required
                    class="w-full bg-slate-700 border border-slate-600 text-slate-100 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                    placeholder="Enter password" autocomplete="current-password">
            </div>
            <button type="submit" class="btn-primary w-full">
                <i class="fa-solid fa-right-to-bracket mr-2"></i> Sign In
            </button>
        </form>
    </div>
</div>
{% endblock %}
